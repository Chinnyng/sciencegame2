        options: ["「玉兔號」。", "「嫦娥一號」。", "「天宮一號」。", "「天問一號」。"],

// ==========================================
// ✅ 自動隨機打亂題目順序 (洗牌魔法)
// ==========================================
for (let i = allQuestions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [allQuestions[i], allQuestions[j]] = [allQuestions[j], allQuestions[i]];
}
    // ✅ 分開兩科的 Local Storage 名稱，防止污染！
    const LOCAL_STORAGE_KEY = 'chiikawa_sci_data_';

    let currentPlayer = "";
    let currentQuestionIndex = 0;
    let coins = 0;
    let wrongQuestions = [];
    let selectedOptions = [];
    let correctCount = 0; 
    let weedInterval;
    let timerInterval;
    let currentMiniGameCoins = 0;

    // 畫面切換邏輯
    function showScreen(screenId) {
        const screens = ['login-screen', 'main-game', 'mini-game-screen', 'level-complete-screen', 'wrong-book', 'leaderboard-screen'];
        screens.forEach(id => document.getElementById(id).style.display = 'none');
        document.getElementById(screenId).style.display = 'block';
        
        if(screenId === 'wrong-book') renderWrongBook();
        if(screenId === 'leaderboard-screen') renderLeaderboard();
    }

    async function login() {
        const nameInput = document.getElementById('player-name-input').value.trim();
        if (nameInput === "") { alert("請先輸入你的名字喔！"); return; }
        
        document.getElementById('login-screen').innerHTML += "<p style='color:blue;' id='loading-text'>🔄 正在同步雲端數據...</p>";
        currentPlayer = nameInput;
        document.getElementById('display-name').innerText = currentPlayer;
        
        // 1. 嘗試載入本地進度
        loadPlayerProgress();

        // 2. 嘗試從 JSONBin 雲端同步最高金幣
        try {
            let response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Access-Key': API_KEY } // ✅ 已修復
            });
            let result = await response.json();
            let boardData = result.record || [];
            
            let cloudPlayer = boardData.find(p => p.name === currentPlayer);
            
            if (cloudPlayer && cloudPlayer.coins > coins) {
                coins = cloudPlayer.coins;
                correctCount = cloudPlayer.correctCount;
                saveProgress(); 
            }
        } catch(e) {
            console.log("雲端同步延遲，使用本地數據");
        }

        let loadingText = document.getElementById('loading-text');
        if(loadingText) loadingText.remove();
        showScreen('main-game');
        loadQuestion();
    }

    function logout() {
        currentPlayer = "";
        document.getElementById('player-name-input').value = "";
        showScreen('login-screen');
    }

    function loadPlayerProgress() {
        // ✅ 使用專屬的 Local Storage Key
        const savedData = localStorage.getItem(LOCAL_STORAGE_KEY + currentPlayer);
        if (savedData) {
            const data = JSON.parse(savedData);
            currentQuestionIndex = data.currentQuestionIndex || 0;
            coins = data.coins || 0;
            correctCount = data.correctCount || 0;
            wrongQuestions = data.wrongQuestions || [];
        } else {
            currentQuestionIndex = 0; coins = 0; correctCount = 0; wrongQuestions = [];
        }
        updateUI();
    }

    function saveProgress() {
        const data = { currentQuestionIndex, coins, correctCount, wrongQuestions };
        // ✅ 使用專屬的 Local Storage Key
        localStorage.setItem(LOCAL_STORAGE_KEY + currentPlayer, JSON.stringify(data));
        updateLeaderboardData();
    }

    // 1. 將分數上傳到 JSONBin.io
    async function updateLeaderboardData() {
        try {
            let response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Access-Key': API_KEY }
            });
            let result = await response.json();
            let boardData = result.record || [];

            let playerIndex = boardData.findIndex(p => p.name === currentPlayer);
            if (playerIndex !== -1) {
                boardData[playerIndex].coins = coins;
                boardData[playerIndex].correctCount = correctCount;
            } else {
                boardData.push({ name: currentPlayer, coins: coins, correctCount: correctCount });
            }

            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Access-Key': API_KEY
                },
                body: JSON.stringify(boardData)
            });
            console.log("分數已成功同步至 JSONBin！");
        } catch (error) {
            console.error('同步失敗:', error);
        }
    }

    // 2. 從 JSONBin.io 下載全班排行榜
    async function renderLeaderboard() {
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '<tr><td colspan="4">努力載入全班排名中... 🐰</td></tr>';

        try {
            let response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Access-Key': API_KEY }
            });
            let result = await response.json();
            let boardData = result.record || [];

            boardData.sort((a, b) => b.coins - a.coins);
            
            tbody.innerHTML = '';
            
            if (boardData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">目前還沒有英雄上榜喔！</td></tr>';
                return;
            }

            boardData.forEach((player, index) => {
                const tr = document.createElement('tr');
                let rankClass = '';
                let rankText = index + 1;
                
                if (index === 0) { rankClass = 'rank-1'; rankText = '🥇 1'; }
                else if (index === 1) { rankClass = 'rank-2'; rankText = '🥈 2'; }
                else if (index === 2) { rankClass = 'rank-3'; rankText = '🥉 3'; }

                if (player.name === currentPlayer) tr.style.backgroundColor = '#fffacd';

                tr.innerHTML = `
                    <td class="${rankClass}">${rankText}</td>
                    <td style="font-weight: bold;">${player.name}</td>
                    <td style="color: #ff8c00; font-weight: bold;">${player.coins}</td>
                    <td>答對 ${player.correctCount} 題</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error('讀取排行榜失敗:', error);
            tbody.innerHTML = '<tr><td colspan="4" style="color:red;">網絡連線錯誤，無法載入排行榜 💦</td></tr>';
        }
    }

    function updateUI() {
        document.getElementById('coins').innerText = coins;
        let level = Math.floor(currentQuestionIndex / 20) + 1;
        document.getElementById('level-num').innerText = level;
    }

    function loadQuestion() {
        if (currentQuestionIndex >= allQuestions.length) {
            document.getElementById('quiz-area').innerHTML = `
                <h2 style="color: #ff69b4;">🏆 恭喜你！完成所有題目！</h2>
                <p>你目前總共累積了 <strong>${coins}</strong> 個金幣！</p>
                <div style="margin-top: 30px;">
                    <button class="btn btn-action" style="background-color: #ffd700;" onclick="showScreen('leaderboard-screen')">🏆 查看排行榜</button>
                    <br><br>
                    <button class="btn btn-start" onclick="replayGame()">🔄 再次挑戰 (繼續累積金幣！)</button>
                </div>
            `;
            return;
        }

        const q = allQuestions[currentQuestionIndex];
        document.getElementById('q-num').innerText = currentQuestionIndex + 1;
        
        let qText = q.question;
        if(q.type === "multiple") qText += " <span style='color: #ff8c00; font-size:0.8em;'>(多選題)</span>";
        document.getElementById('question-text').innerHTML = qText;
        
        document.getElementById('hint-text').innerText = q.hint;
        document.getElementById('hint-text').style.display = 'none';
        document.getElementById('feedback').innerText = '';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = q.type === "multiple" ? 'inline-block' : 'none';
        selectedOptions = [];

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = ''; 

        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.id = 'opt-' + index;
            if(q.type === "single") btn.onclick = () => checkSingleAnswer(index, btn);
            else btn.onclick = () => toggleMultipleSelection(index, btn);
            optionsContainer.appendChild(btn);
        });
        
        saveProgress();
        updateUI();
    }

    function replayGame() {
        currentQuestionIndex = 0;
        selectedOptions = [];
        
        document.getElementById('quiz-area').innerHTML = `
            <div class="question" id="question-text">載入題目中...</div>
            <div class="options" id="options-container"></div>
            <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                <button class="btn" onclick="toggleHint()">💡 小八貓提示</button>
                <button class="btn" id="submit-btn" style="display:none; background-color: #ffa500;" onclick="submitMultipleChoice()">提交答案</button>
                <button class="btn" id="next-btn" style="display:none; background-color: #32cd32;" onclick="nextQuestion()">下一題 ➔</button>
            </div>
            <div class="hint-text" id="hint-text"></div>
            <div id="feedback"></div>
        `;
        
        saveProgress(); 
        loadQuestion(); 
    }

    function checkSingleAnswer(selectedIndex, btn) {
        const q = allQuestions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);

        if (selectedIndex === q.answer) {
            btn.style.backgroundColor = '#98fb98';
            document.getElementById('feedback').innerHTML = "✨ 答對了！ +10 金幣";
            document.getElementById('feedback').style.color = "green";
            coins += 10; correctCount++;
        } else {
            btn.style.backgroundColor = '#ffb6c1';
            buttons[q.answer].style.backgroundColor = '#98fb98';
            document.getElementById('feedback').innerHTML = "💦 答錯了，已記錄在錯題本。";
            document.getElementById('feedback').style.color = "red";
            recordWrongQuestion(q);
        }
        saveProgress();
        updateUI();
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function toggleMultipleSelection(index, btn) {
        if(selectedOptions.includes(index)) {
            selectedOptions = selectedOptions.filter(i => i !== index);
            btn.classList.remove('selected-multiple');
        } else {
            selectedOptions.push(index);
            btn.classList.add('selected-multiple');
        }
    }

    function submitMultipleChoice() {
        if(selectedOptions.length === 0) return;
        const q = allQuestions[currentQuestionIndex];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        document.getElementById('submit-btn').style.display = 'none';

        let isCorrect = JSON.stringify(selectedOptions.sort()) === JSON.stringify(q.answer.sort());

        if (isCorrect) {
            selectedOptions.forEach(idx => document.getElementById('opt-' + idx).style.backgroundColor = '#98fb98');
            document.getElementById('feedback').innerHTML = "✨ 全中！太棒了！ +10 金幣";
            document.getElementById('feedback').style.color = "green";
            coins += 10; correctCount++;
        } else {
            selectedOptions.forEach(idx => document.getElementById('opt-' + idx).style.backgroundColor = '#ffb6c1');
            q.answer.forEach(idx => document.getElementById('opt-' + idx).style.backgroundColor = '#98fb98');
            document.getElementById('feedback').innerHTML = "💦 答案不完全正確，已記錄在錯題本。";
            document.getElementById('feedback').style.color = "red";
            recordWrongQuestion(q);
        }
        saveProgress();
        updateUI();
        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function recordWrongQuestion(q) {
        if (!wrongQuestions.some(wq => wq.question === q.question)) wrongQuestions.push(q);
    }

    function toggleHint() {
        const hintEl = document.getElementById('hint-text');
        hintEl.style.display = hintEl.style.display === 'none' ? 'block' : 'none';
    }

    // ========== 🎈 爆波波小遊戲 ========== //

    function nextQuestion() {
        currentQuestionIndex++;
        
        if (currentQuestionIndex > 0 && currentQuestionIndex % 20 === 0 && currentQuestionIndex < allQuestions.length) {
            startMiniGame(); 
        } else {
            loadQuestion(); 
        }
    }

    function startMiniGame() {
        showScreen('mini-game-screen');
        currentMiniGameCoins = 0;
        let timeLeft = 30;
        
        document.getElementById('timer').innerText = timeLeft;
        document.getElementById('mini-game-coins').innerText = currentMiniGameCoins;
        document.getElementById('game-area').innerHTML = ''; 

        // 生成氣球
        weedInterval = setInterval(spawnBalloon, 500); 
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) {
                endMiniGame();
            }
        }, 1000);
    }

    function spawnBalloon() {
        const area = document.getElementById('game-area');
        const balloon = document.createElement('div');
        
        // 隨機顏色氣球
        const colors = ['🔴', '🔵', '🟡', '🟢', '🟣', '🟠'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        
        balloon.innerText = randomColor;
        balloon.className = 'balloon-target';
        
        // 隨機位置
        balloon.style.left = Math.random() * 80 + '%';
        balloon.style.top = Math.random() * 70 + '%';
        
        // 點擊事件
        balloon.onclick = function() {
            let reward = 2; // 每個氣球 2 金幣
            currentMiniGameCoins += reward;
            coins += reward;
            document.getElementById('mini-game-coins').innerText = currentMiniGameCoins;
            
            balloon.innerText = '💥'; // 爆開效果
            balloon.style.pointerEvents = 'none'; 
            setTimeout(() => balloon.remove(), 200);
        };
        
        area.appendChild(balloon);
        
        // 氣球飄走（消失）
        setTimeout(() => {
            if(balloon.parentElement) balloon.remove();
        }, 1200);
    }

    function endMiniGame() {
        clearInterval(weedInterval);
        clearInterval(timerInterval);
        document.getElementById('game-area').innerHTML = '';
        
        alert(`🎈 時間到！\n你篤爆咗好多彩色氣球，額外賺到 ${currentMiniGameCoins} 個金幣！`);
        saveProgress();
        showLevelCompleteScreen();
    }

    function showLevelCompleteScreen() {
        showScreen('level-complete-screen');
        let completedLevel = currentQuestionIndex / 20;
        document.getElementById('completed-level-display').innerText = completedLevel;
        document.getElementById('total-coins-display').innerText = coins;
    }

    function continueToNextLevel() {
        showScreen('main-game');
        loadQuestion();
    }

    // ========== 錯題本渲染 ========== //
    function renderWrongBook() {
        const list = document.getElementById('wrong-list');
        if (wrongQuestions.length === 0) {
            list.innerHTML = "<p style='text-align:center;'>太厲害了！目前沒有錯題記錄喔！✨</p>";
            return;
        }
        list.innerHTML = '';
        wrongQuestions.forEach((q, index) => {
            const item = document.createElement('div');
            item.className = 'list-item';
            let correctText = q.type === "single" ? q.options[q.answer] : q.answer.map(idx => q.options[idx]).join(' , ');
            item.innerHTML = `<p><strong>Q${index + 1}: ${q.question}</strong></p><div class="correct-answer-text">✅ 正確答案：${correctText}</div><p style="font-size: 0.9em; color: #666; margin-top: 5px;">💡 ${q.hint}</p>`;
            list.appendChild(item);
        });
    }

    // 新增：重設個人進度功能
    function resetMyProgress() {
        if(confirm("警告：確定要清除所有進度，重新由第一關開始嗎？\n（你的金幣和錯題本也會清零喔！）")) {
            // ✅ 清除專屬的 Local Storage Key
            localStorage.removeItem(LOCAL_STORAGE_KEY + currentPlayer);
            
            currentQuestionIndex = 0;
            coins = 0;
            correctCount = 0;
            wrongQuestions = [];
            selectedOptions = [];
            
            saveProgress(); 
            loadQuestion();
        }
    }
</script>
